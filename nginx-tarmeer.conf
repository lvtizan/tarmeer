# Nginx 配置示例：让 Tarmeer 站点从 /tarmeer/tarmeer_web_portal 正确提供静态文件
# 用法：复制到 ECS 的 /etc/nginx/conf.d/ 或 sites-available，然后 nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name 47.91.108.104;   # 或改成你的域名，如 www.tarmeer.com
    root /tarmeer/tarmeer_web_portal;
    index index.html;

    # 正确返回 .js / .css 等静态资源，避免被当成路由返回 index.html
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000";
        try_files $uri =404;
    }

    # SPA：非文件请求回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头（可选）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
