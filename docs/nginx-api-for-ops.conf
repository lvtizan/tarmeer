# =============================================================================
# Tarmeer 4.0 — API 反向代理配置（供运维同事使用）
# =============================================================================
# 说明：
# - 本文件由项目生成，供运维同事复制/合并到现有 Nginx 配置。
# - 部署脚本与 AI 不会自动修改 Nginx；请人工合并后 nginx -t && systemctl reload nginx。
# - 后端服务默认监听 127.0.0.1:3002，部署目录 /tarmeer/tarmeer_api。
# =============================================================================

# 方式一：在现有 server { } 内增加下面这段 location

location /api {
    proxy_pass http://127.0.0.1:3002;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 【重要】允许大文件上传（项目图片 base64 编码后体积较大）
    # 不设此项 nginx 默认只允许 1MB，上传图片必然 413 失败
    client_max_body_size 25m;
}

# 方式二：若希望独立配置文件，可将下面整段存为 /etc/nginx/conf.d/tarmeer-api.conf
# （注意：与主站共用 80 时需用 include 把 location /api 合并进主 server，不能重复 listen 80）

